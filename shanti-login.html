<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shanti Recovery — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* —— Brand palette, from the Shanti logo —— */
    --rose:      #C8A297;  /* lotus mark */
    --rose-deep: #A9786B;
    --rose-soft: #E4CDC4;
    --rose-wash: #F8EFEA;
    --charcoal:  #333132;  /* "SHANTI" wordmark + ink */
    --ink-soft:  #6E6663;
    --cream:     #FAF5F1;  /* canvas */
    --line:      #EADFD8;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{
    font-family:"Inter", system-ui, sans-serif;
    background:#e6ddd6;
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:32px;
    -webkit-font-smoothing:antialiased;
  }

  /* —— Phone frame (393 × 853, matching the Figma frame) —— */
  .frame{
    width:393px;
    height:853px;
    background:#ffffff;
    border-radius:40px;
    overflow:hidden;
    box-shadow:0 40px 90px -40px rgba(86,60,52,.45), 0 0 0 1px rgba(86,60,52,.05);
    display:flex;
    flex-direction:column;
  }

  /* div#1:7 — warm canvas, centers the content block */
  .canvas{
    flex:1;
    background:
      radial-gradient(120% 70% at 50% 0%, #ffffff 0%, var(--cream) 55%, var(--rose-wash) 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  /* Container #1:8 */
  .content{ width:361px; }

  /* —— Brand block —— */
  .brand{ text-align:center; margin-bottom:48px; }
  .logo-circle{
    width:96px;
    height:96px;
    margin:0 auto 24px;
    background:var(--charcoal);
    border-radius:50%;
    display:grid;
    place-items:center;
    box-shadow:0 16px 30px -14px rgba(51,49,50,.55);
  }
  .logo-circle svg{ width:52px; height:auto; display:block; }
  .brand h1{
    font-weight:600;
    font-size:30px;
    line-height:36px;
    letter-spacing:0.4px;
    color:var(--charcoal);
  }
  .brand .tag{
    margin-top:8px;
    font-weight:700;
    font-size:10px;
    letter-spacing:0.42em;
    text-transform:uppercase;
    color:var(--rose);
    padding-left:0.42em;
  }
  .brand p{
    margin-top:14px;
    font-weight:400;
    font-size:16px;
    line-height:24px;
    letter-spacing:-0.31px;
    color:var(--rose-deep);
  }

  /* —— Buttons —— */
  .actions{ display:flex; flex-direction:column; gap:16px; }
  .btn{
    height:71px;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    font-weight:600;
    font-size:18px;
    letter-spacing:-0.44px;
    cursor:pointer;
    border:1.56px solid transparent;
    transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  }
  .btn svg{ width:24px; height:24px; }
  .btn-primary{
    background:var(--charcoal);
    border-color:var(--charcoal);
    color:#ffffff;
  }
  .btn-primary:hover{ background:#211f20; transform:translateY(-1px); box-shadow:0 14px 26px -12px rgba(51,49,50,.6); }
  .btn-secondary{
    background:#ffffff;
    border-color:var(--rose-soft);
    color:var(--charcoal);
  }
  .btn-secondary:hover{ background:var(--rose-wash); transform:translateY(-1px); box-shadow:0 12px 24px -14px rgba(169,120,107,.4); }
  .btn:active{ transform:translateY(0); }

  /* —— Privacy note —— */
  .privacy{
    margin-top:32px;
    background:var(--rose-wash);
    border:1.56px solid var(--rose-soft);
    border-radius:16px;
    padding:18px;
    text-align:center;
  }
  .privacy p{
    font-weight:400;
    font-size:12px;
    line-height:16px;
    color:var(--ink-soft);
    max-width:293px;
    margin:0 auto;
  }
</style>
</head>
<body>

  <div class="frame">
    <div class="canvas">
      <div class="content">

        <!-- Brand -->
        <div class="brand">
          <div class="logo-circle">
            <!-- Shanti lotus mark (from logo), tinted rose on charcoal -->

          </div>
          <h1>Shanti Recovery</h1>
          <div class="tag">Recovery Wellness</div>
          <p>Your journey to recovery starts here</p>
        </div>

        <!-- Actions -->
        <div class="actions">
          <button class="btn btn-primary">
            <!-- UserPlus icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <line x1="19" y1="8" x2="19" y2="14"/>
              <line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
            Create New Account
          </button>

          <button class="btn btn-secondary">
            <!-- LogIn icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Sign In
          </button>
        </div>

        <!-- Privacy note -->
        <div class="privacy">
          <p>Your privacy matters. All your data is encrypted and secure.</p>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
